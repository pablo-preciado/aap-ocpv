apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-operator-subscriptions
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: 'https://github.com/pablo-preciado/aap-ocpv'
    targetRevision: main
    path: gitops/subscriptions
  destination:
    server: 'https://kubernetes.default.svc'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
