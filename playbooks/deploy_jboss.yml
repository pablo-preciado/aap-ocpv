- name: Deploy jboss to VM's in the workloads namespace
  hosts: namespace_workloads
  become: true
  become_method: sudo
  roles:
    - role: redhat.eap.eap_install
      vars:
        eap_version: "8.0.0"             # Specify your JBoss EAP version
        eap_root: "/opt/jboss-eap"     # Installation directory
        eap_admin_user: "redhat1"        # Admin username
        eap_admin_password: "redhat1" # Admin password