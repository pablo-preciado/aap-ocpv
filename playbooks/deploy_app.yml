- name: Deploy jboss quickstart application
  hosts: namespace_workloads
  become: true
  
  tasks:

    - name: Install packages needed to deploy application
      ansible.builtin.dnf:
        state: latest
        name:
          - git
          - maven

    - name: Clone jboss quickstarts jboss repo
      ansible.builtin.git:
        repo: 'https://github.com/jboss-developer/jboss-eap-quickstarts.git'
        dest: '/home/redhat1'

    - name: Run maven build
      ansible.builtin.command: 'mvn -f /home/redhat1/jboss-eap-quickstarts/helloworld/pom.xml clean package'

    - name: Deploy application to jboss server
      ansible.builtin.command: 'mvn -f /home/redhat1/jboss-eap-quickstarts/helloworld/pom.xml wildfly:deploy'